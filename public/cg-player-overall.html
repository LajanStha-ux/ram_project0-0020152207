<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HJNBL Overall Player Stats Graphic</title>
    <style>
        /* IMPORT WINNER SANS CONDENSED BOLD DIRECTLY FROM YOUR GITHUB REPO */
        @font-face {
            font-family: 'WinnerSans';
            src: url('https://cdn.jsdelivr.net/gh/LajanStha-ux/Font-Hosting-New@main/fonts/WinnerSans-CondBold.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* UNIVERSAL FONT LOCK - Forces Winner Sans on every element and prevents faux-bolding */
        * {
            font-family: 'WinnerSans', sans-serif !important;
            font-weight: normal !important; 
        }

        /* CANVAS LOCKED TO 1920x1080 */
        html, body { margin: 0; padding: 0; width: 1920px; height: 1080px; overflow: hidden; background: transparent !important; color: white; display: flex; justify-content: center; align-items: center; letter-spacing: 1px;}
        
        .cg-wrapper { position: relative; width: 1400px; height: 650px; overflow: hidden; border-radius: 8px; padding: 4px; opacity: 0; transition: opacity 0.1s; pointer-events: none;}
        .cg-wrapper.show { opacity: 1; }
        .wipe-block { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, #444 0%, #fff 50%, #444 100%); z-index: 10; transform: translateX(-101%); transition: transform 0.4s cubic-bezier(0.8, 0, 0.2, 1); box-shadow: 0 0 20px rgba(255,255,255,0.8); }
        .wipe-block.in-middle { transform: translateX(0%); }
        .wipe-block.in-done { transform: translateX(101%); }
        
        /* ADJUSTED: Reduced vertical padding from 35px to 20px */
        .cg-box { background: linear-gradient(180deg, #2a2a2a 0%, #111111 40%, #000000 100%); border: 2px solid #555; border-top: 3px solid #ccc; border-bottom: 3px solid #111; padding: 20px 50px; position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px; opacity: 0; border-radius: 8px; box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 2px 10px rgba(255,255,255,0.3); box-sizing: border-box; display: flex; flex-direction: column;}
        
        .cg-header { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #333; padding-bottom: 15px; margin-bottom: 20px; box-shadow: 0 2px 0 #000; height: 110px; flex-shrink: 0;}
        .cg-logo { height: 110px; width: auto; margin-right: 35px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.4)); display: block;}
        .neba-logo { height: 80px; width: auto; filter: drop-shadow(0 0 8px rgba(255,255,255,0.3)); display: block;}
        .cg-title { font-size: 38px; letter-spacing: 2px; text-transform: uppercase; color: #fff; margin: 0; text-shadow: 0 2px 4px #000;}
        .cg-subtitle { font-size: 16px; color: #d4af37; text-transform: uppercase; letter-spacing: 4px; margin: 5px 0 0 0;}

        .cg-content { display: flex; align-items: center; gap: 50px; flex-grow: 1; height: 100%; }
        
        /* PLAYER SIDE */
        .player-col { display: flex; flex-direction: column; align-items: center; width: 350px; text-align: center; }
        .photo-container { position: relative; margin-bottom: 30px;}
        .cg-photo { width: 300px; height: 300px; object-fit: cover; object-position: top; border-radius: 8px; border: 3px solid #ccc; box-shadow: 0 10px 20px rgba(0,0,0,0.8); background: #000; position: relative; z-index: 2;}
        .cg-photo-team-logo { position: absolute; bottom: -30px; right: -30px; width: 130px; height: 130px; object-fit: contain; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.9)); z-index: 3;}
        
        .cg-data-name { font-size: 42px; line-height: 1.1; text-shadow: 2px 2px 5px #000; color: #fff; margin-bottom: 5px;}
        .cg-data-jersey { color: #d4af37; font-size: 26px; letter-spacing: 2px; }
        .cg-data-team { font-size: 22px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px;}

        /* STATS GRID SIDE */
        /* ADJUSTED: Reduced grid gap from 20px to 10px */
        .stats-grid { flex-grow: 1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        
        /* ADJUSTED: Reduced vertical padding from 25px to 15px */
        .stat-box { background: linear-gradient(180deg, #333333 0%, #000000 100%); padding: 15px 20px; border-radius: 8px; border: 1px solid #555; border-bottom: 1px solid #111; text-align: center; box-shadow: inset 0 2px 10px rgba(255,255,255,0.2), 0 5px 15px rgba(0,0,0,0.5);}
        
        .stat-label { color: #aaa; font-size: 18px; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 8px;}
        .stat-val { color: #fff; font-size: 56px; display: block; text-shadow: 0 2px 5px #000; line-height: 1;}
        .val-gold { color: #d4af37 !important; }
        .val-red { color: #e5142a !important; }
    </style>
</head>
<body>
    <div class="cg-wrapper" id="cgWrapper">
        <div class="wipe-block" id="wipeBlock"></div>
        <div class="cg-box" id="cgBox">
            <div class="cg-header">
                <div style="display: flex; align-items: center;">
                    <img src="/assets/tour_logo.png" class="cg-logo">
                    <div>
                        <h1 class="cg-title" id="cgTitle">TOURNAMENT STATS</h1>
                        <p class="cg-subtitle" id="cgSubtitle">OVERALL PLAYER PERFORMANCE</p>
                    </div>
                </div>
                <img src="/assets/NeBA.png" class="neba-logo">
            </div>
            <div class="cg-content" id="cgContent"></div>
        </div>
    </div>

    <script>
        let lastTimestamp = 0; let currentLogos = {};
        const teamDict = { "KIRTIPUR": "IIMS Kirtipur", "TIMES": "Times Club", "SOLO": "Solo Basketball Academy", "ARMY": "Tribhuwan Army Club", "ROYAL": "Royal", "KVC HOUNDS": "KVC Hounds", "GGIC": "Golden Gate International", "PLAYBOX": "Playbox Arena" };
        const getFullName = (s) => teamDict[s] || s;
        function getLogo(t) { return currentLogos[t] || '/assets/tour_logo.png'; }

        async function pollServer() {
            try { const res = await fetch('/api/cg-state'); const state = await res.json(); if (state.timestamp !== lastTimestamp) { lastTimestamp = state.timestamp; updateGraphic(state); } } catch(e) {}
            setTimeout(pollServer, 500); 
        }

        function playTechWipe(contentHtml) {
            const wrapper = document.getElementById('cgWrapper'); const wipe = document.getElementById('wipeBlock'); const box = document.getElementById('cgBox');
            if (contentHtml === 'HIDE') {
                wipe.className = 'wipe-block in-done'; setTimeout(() => { wipe.className = 'wipe-block in-middle'; }, 50); setTimeout(() => { box.style.opacity = '0'; }, 400); setTimeout(() => { wipe.className = 'wipe-block'; }, 450); setTimeout(() => { wrapper.classList.remove('show'); }, 850); return;
            }
            wrapper.classList.add('show'); wipe.className = 'wipe-block'; box.style.opacity = '0'; document.getElementById('cgContent').innerHTML = contentHtml;
            setTimeout(() => { wipe.className = 'wipe-block in-middle'; }, 50); setTimeout(() => { box.style.opacity = '1'; }, 400); setTimeout(() => { wipe.className = 'wipe-block in-done'; }, 450); 
        }

        function updateGraphic(state) {
            if (state.action === 'hide') { playTechWipe('HIDE'); return; }
            const data = state.payload; currentLogos = data.logos || {}; 
            
            if (state.type === 'player-overall') {
                let ppg = (data.pts / Math.max(1, data.gp)).toFixed(1);
                
                let html = `
                    <div class="player-col">
                        <div class="photo-container">
                            <img src="${data.photo || '/assets/tour_logo.png'}" class="cg-photo">
                            <img src="${getLogo(data.team)}" class="cg-photo-team-logo">
                        </div>
                        <div class="cg-data-name">${data.name}</div>
                        <div class="cg-data-jersey">JN: ${data.jersey}</div>
                        <div class="cg-data-team">${getFullName(data.team)}</div>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-box"><span class="stat-label">GAMES PLAYED</span><span class="stat-val">${data.gp}</span></div>
                        <div class="stat-box"><span class="stat-label">TOTAL POINTS</span><span class="stat-val val-gold">${data.pts}</span></div>
                        <div class="stat-box"><span class="stat-label">POINTS PER GAME</span><span class="stat-val val-red">${ppg}</span></div>
                        
                        <div class="stat-box"><span class="stat-label">TOTAL REBOUNDS</span><span class="stat-val">${data.reb}</span></div>
                        <div class="stat-box"><span class="stat-label">TOTAL ASSISTS</span><span class="stat-val">${data.ast}</span></div>
                        <div class="stat-box"><span class="stat-label">TOTAL 3-POINTERS</span><span class="stat-val val-gold">${data.threes}</span></div>
                        
                        <div class="stat-box"><span class="stat-label">TOTAL STEALS</span><span class="stat-val">${data.stl}</span></div>
                        <div class="stat-box"><span class="stat-label">TOTAL BLOCKS</span><span class="stat-val">${data.blk}</span></div>
                        <div class="stat-box"><span class="stat-label">TURNOVERS</span><span class="stat-val">${data.tov}</span></div>
                    </div>
                `;
                playTechWipe(html);
            }
        }
        pollServer();
    </script>
</body>
</html>
